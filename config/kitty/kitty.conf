###############################################################
#                                                             #
#   FernuDev DotFiles configuration for Hyprland              #
#                                                             #
###############################################################

# Font
font_family Hack Nerd Font Mono Bold
font_size 13

# Cursor
cursor #ad8ee6
cursor_shape block
cursor_beam_thickness 1.5

# Window
background_opacity 0.90
window_padding_width 8

# Blur (Hyprland / compositor)
[blur]
background=true

# Colors
foreground #a9b1d6
background #0f0f14

# Black
color0  #32344a
color8  #444b6a

# Red
color1  #f7768e
color9  #ff7a93

# Green
color2  #9ece6a
color10 #b9f27c

# Yellow
color3  #e0af68
color11 #ff9e64

# Blue
color4  #7aa2f7
color12 #7da6ff

# Magenta
color5  #ad8ee6
color13 #bb9af7

# Cyan
color6  #449dab
color14 #0db9d7

# White
color7  #787c99
color15 #acb0d0

###############################################################
# Tab Bar
###############################################################

tab_bar_style powerline

active_tab_background   #98c379
inactive_tab_background #e06c75
inactive_tab_foreground #000000
tab_bar_margin_color    black

shell zsh

disable_ligatures never

url_color #61afef

url_style curly

map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

map ctrl+shift+1 copy_to_buffer a
map ctrl+shift+2 paste_from_buffer a
map ctrl+shift+3 copy_to_buffer b
map ctrl+shift+4 paste_from_buffer b


cursor_shape beam
cursor_beam_thickness 1.8

mouse_hide_wait 3.0
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

map ctrl+shift+z toggle_layout stack
